# ─────────────────────────────────────────────────────────────────────────────
# Benchmark matrix — the SINGLE SOURCE OF TRUTH for the cross-tool benchmark.
#
# Everything propagates from here:
#   • the seed fixture  → the Rust `seed` tool (src/bin/seed) is invoked with the
#     sizes below, so the fixture is defined ONCE and applied to every DB;
#   • the tool set + versions + steelman tuning → the run harness invokes each
#     tool at its declared best-effort config;
#   • the report (harm matrix: table × tool × database) renders from the results.
#
# Rules (per the systematization plan):
#   • ALWAYS pin `version` + `version_date`; ALWAYS (re)test on the LATEST version
#     (use `latest` to refresh, then bump version + date).
#   • ONE canonical seed fixture (the Rust seed tool), applied to every database.
#   • record the `hardware` every run was measured on.
#   • smokes first (a small subset) → show results → then the full run.
# ─────────────────────────────────────────────────────────────────────────────

meta:
  updated: "2026-07-09"
  hardware:
    machine: "Apple M1 Pro"
    cpu: "10-core (8 performance + 2 efficiency)"
    ram_gb: 16
    os: "macOS 26.2 (arm64)"
  # A run stamps its own hardware/date into the report; this is the current dev box.

# Source databases the matrix runs against (primary CI versions).
databases:
  - { engine: postgres,  version: "16",   scheme: "postgresql://" }
  - { engine: mysql,     version: "8.0",  scheme: "mysql://" }
  - { engine: sqlserver, version: "2022", scheme: "sqlserver://" }
  # mongodb is a document store (JSON-blob) — a separate bench shape, tracked apart.

# ─── Seed fixture ─────────────────────────────────────────────────────────────
# Generated by the Rust `seed` tool (src/bin/seed, feature `dev-seed`) — a 27-table
# app-like schema (users / orders / events / page_views / content_items + the
# dimension & lookup tables), applied IDENTICALLY to every source DB. The row
# counts live here and propagate as the tool's args (the harness passes them),
# so the fixture size is declared once. Derived sizes:
#   orders ≈ users × orders_per_user   ·   events ≈ users × events_per_user
seed:
  tool: "cargo run --release --bin seed --features dev-seed --"
  profile: fast            # fast (SQL-side generate_series) | realistic (COPY) | insert
  target: both             # postgres | mysql | both   (SQL Server seeded via its own path)
  sizes:                   # → passed as `seed --<knob> <value>`
    users: 100000                 # users table
    orders_per_user: 10           # orders ≈ 1,000,000
    events_per_user: 50           # events ≈ 5,000,000
    page_views: 2000000           # wide table (degraded / memory-pressure scenario)
    content_items: 200000         # heavy text (worst case for peak RSS)
    coalesce_rows: 2000           # composite-cursor demo (NULL updated_at)
    coalesce_null_ratio: 0.35

# ─── Tools ───────────────────────────────────────────────────────────────────
# `steelman` = the tuned, best-effort config that gives each competitor its
# fairest shot (min-memory / source-friendly), so the comparison is not a
# strawman. Verified 2026-07-09.
tools:
  - name: rivet
    role: subject
    lang: Rust
    version: "0.18.0"
    version_date: "2026-07-09"
    latest: "rivet --version"
    steelman: { config: "mode: chunked, chunk_size: 25000" }   # ~128 MB, throughput intact

  - name: sling
    role: competitor
    lang: Go
    version: "1.5.20"
    version_date: "2026-07-09"
    latest: "sling --version   # brew install slingdata-io/sling/sling"
    steelman: { note: "built-in chunk_size is paywalled (Pro); min-memory only via a hand-written 20× id-range backfill loop" }

  - name: ingestr
    role: competitor
    lang: Go
    version: "1.0.72"
    version_date: "2026-07-09"
    latest: "curl -LsSf https://getbruin.com/install/ingestr | sh"
    steelman: { note: "single-binary CLI, DB→DB; measure default + best available chunking/interval flags" }

  - name: dlt
    role: competitor
    lang: Python
    version: "1.28.1"
    version_date: "2026-07-09"
    latest: "pip install -U dlt"
    steelman: { config: "buffer_max_items=5000" }   # ~1.27 GB tuned

  - name: duckdb
    role: competitor
    lang: C++
    version: "1.5.4"
    version_date: "2026-07-09"
    latest: "pip install -U duckdb"
    steelman: { config: "memory_limit=4GB", note: "lowest COMPLETING limit; OOMs at 512MB/2GB (its floor, not a choice)" }

  - name: clickhouse-local
    role: competitor
    lang: C++
    version: "25.8-LTS"
    version_date: "2026-07-09"
    latest: "clickhouse local --version   # curl https://clickhouse.com/ | sh"
    steelman: { note: "OOMs (code 241) below its floor; give it its lowest completing max_memory_usage" }

  - name: odbc2parquet
    role: competitor
    lang: Rust
    version: "11.0.1"
    version_date: "2026-07-09"
    latest: "cargo install odbc2parquet"
    steelman: { config: "--batch-size-memory 256Mb" }   # tuned; one SELECT * per table

# ─── Harm matrix (metrics) ───────────────────────────────────────────────────
# Captured per (tool × database × table). The report renders this as matrices by
# table, by framework, and by database.
metrics:
  - { key: wall_s,          unit: s,     desc: "total wall time" }
  - { key: peak_rss_mb,     unit: MB,    desc: "peak resident memory" }
  - { key: longest_query_s, unit: s,     desc: "longest single query held on the source (source-safety)" }
  - { key: rows,            unit: count, desc: "rows exported (correctness gate — must equal source)" }
  - { key: output_bytes,    unit: bytes, desc: "parquet output size (*.parquet only)" }
  - { key: status,          unit: enum,  desc: "ok | OOM | DNF | error" }

# ─── Source-harm metrics (the POINT of the bench) ────────────────────────────
# How much each tool HURTS the source DB. Sampled before → after the extraction
# and reported as the DELTA, per engine (the counters differ by engine). These
# are what separates a source-safe chunked read from a `SELECT *` that spills.
harm_metrics:
  postgres:     # pg_stat_database / pg_stat_io / pg_stat_bgwriter
    - { key: tup_returned,     desc: "tuples read from the source (read amplification)" }
    - { key: tup_fetched,      desc: "tuples fetched" }
    - { key: temp_bytes,       desc: "temp-file spill (a naive SELECT * spills; chunked does not)" }
    - { key: blks_read,        desc: "disk blocks read" }
    - { key: blk_read_time_ms, desc: "time spent reading blocks" }
    - { key: peak_connections, desc: "peak concurrent source connections held" }
    - { key: longest_xact_s,   desc: "longest single open transaction on the source" }
  mysql:        # SHOW GLOBAL STATUS deltas
    - { key: Innodb_rows_read,                 desc: "rows read from InnoDB" }
    - { key: Innodb_buffer_pool_reads,         desc: "physical page reads (cache miss)" }
    - { key: Innodb_buffer_pool_read_requests, desc: "logical page reads" }
    - { key: Innodb_log_waits,                 desc: "log-buffer waits (write pressure)" }
    - { key: tmp_disk_tables,                  desc: "temp tables spilled to disk" }
    - { key: Handler_read_rnd_next,            desc: "full-scan row reads" }
  sqlserver:    # sys.dm_exec_* / SET STATISTICS IO
    - { key: logical_reads,   desc: "logical page reads" }
    - { key: physical_reads,  desc: "physical page reads" }
    - { key: worker_time_ms,  desc: "CPU worker time on the source" }

# ─── Smoke ───────────────────────────────────────────────────────────────────
# Run first, show results, before the full matrix. A tiny seed (fast) on one DB,
# all tools, so a full round-trip is a couple of minutes, not an hour.
smoke:
  seed_sizes: { users: 2000, page_views: 20000, content_items: 5000 }
  databases: [postgres]
  tables: [content_items, page_views, orders]   # the stress + wide + fact tables
  tools: [rivet, sling, ingestr, dlt, duckdb, clickhouse-local, odbc2parquet]
