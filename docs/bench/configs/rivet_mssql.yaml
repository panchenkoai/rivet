# Rivet SQL Server benchmark config — what we ran to produce the perf section of
# REPORT_mssql.md. Same `table:` + chunked strategy as the PG/MySQL configs.
# `accept_invalid_certs` because the dev container uses a self-signed cert (SQL
# Server forces TLS on the login handshake regardless).

source:
  type: mssql
  url: "sqlserver://sa:Rivet_Passw0rd!@127.0.0.1:1433/rivet"
  tls:
    accept_invalid_certs: true

exports:
  - { name: bench_narrow, table: bench_narrow, mode: chunked, chunk_size_memory_mb: 256, format: parquet, compression: snappy, destination: { type: local, path: /tmp/rivet_bench/output_mssql/rivet/bench_narrow } }
  - { name: bench_wide,   table: bench_wide,   mode: chunked, chunk_size_memory_mb: 256, format: parquet, compression: snappy, destination: { type: local, path: /tmp/rivet_bench/output_mssql/rivet/bench_wide } }
