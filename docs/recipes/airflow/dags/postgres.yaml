# Generated by rivet init — PostgreSQL schema "public" (17 objects)
# Review and adjust before running: rivet check -c rivet.yaml

source:
  type: postgres
  url_env: RIVET_PG_URL
  tls: { mode: disable }   # local demo over trusted docker net

# One export per table/view — review modes and destinations before running.
exports:
  - name: bench_decimal
    wave: 3
    parallel_safe: false
    query: >
      SELECT id, price, qty, discount, total, updated_at
      FROM bench_decimal
    # auto: ~200K rows ≥ 100K threshold and chunk column 'id' is available. NOTE: chunked re-reads
    # the whole table each run — for scheduled re-runs, `mode: incremental` on 'updated_at' pulls
    # only changed rows
    mode: chunked
    chunk_column: id
    chunk_size: 100000
    chunk_checkpoint: true  # record per-chunk progress so `rivet run --resume` can finish a crashed
    # run
    format: parquet
    parquet:
      row_group_strategy: auto
      target_row_group_mb: 128
    meta_columns:  # adds 2 columns to the output (drop this block to omit them)
      exported_at: true  # _rivet_exported_at: when the row was exported
      row_hash: true  # _rivet_row_hash: per-row hash for change detection
    destination:
      type: local
      # rivet also writes manifest.json + _SUCCESS here (its metadata)
      path: ./output/postgres/bench_decimal/
    columns:
      price: decimal(18,4)
      qty: decimal(10,2)
      discount: decimal(5,4)
      total: decimal(20,4)
