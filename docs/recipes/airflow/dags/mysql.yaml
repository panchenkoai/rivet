    chunk_size: 250000
    chunk_checkpoint: true  # record per-chunk progress so `rivet run --resume` can finish a crashed
    # run
    # est. peak RSS ≈ 92 MB (4 workers × ~19 MB/worker @ ~51 B/row); lower `parallel` to spend less
