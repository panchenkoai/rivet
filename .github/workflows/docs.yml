name: Deploy docs (mdBook)

# Builds the mdBook site from docs/ and publishes it to GitHub Pages.
# One-time repo setup: Settings → Pages → Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "book.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight publish; serialise deploys.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "0.5.4"
      - name: Build book
        run: mdbook build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          # Matches build-dir in book.toml.
          path: target/book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
