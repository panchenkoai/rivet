name: Nightly — Heavy CI

# Runs every night at 02:00 UTC and can be triggered manually.
# These jobs are too slow or resource-intensive for the standard PR path.
# They complement the PR gate (ci.yml) with deeper coverage.
#
# Suites covered:
#   heavy-live    — all live #[ignore] tests (postgres + mysql + S3 + GCS-compat)
#   bench-smoke   — Criterion benchmarks (compile + 1 sample, no regression gate)
#   bench-e2e     — end-to-end benchmark runner (wall time + RSS, writes report)
#   release-gate  — full release checklist: tests + build + audit

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  POSTGRES_URL: postgres://rivet:rivet@localhost:5432/rivet
  MYSQL_URL: mysql://rivet:rivet@127.0.0.1:3306/rivet

jobs:
  # ── heavy live test suite ───────────────────────────────────────────────────

  heavy-live:
    name: Heavy live tests (all ignored)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Start services
        run: docker compose up -d postgres mysql minio fake-gcs toxiproxy

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done
          for i in $(seq 1 30); do docker compose exec -T mysql mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done

      - name: Build release
        run: cargo build --release

      - name: Seed databases
        run: |
          PGPASSWORD=rivet psql -h localhost -U rivet -d rivet -f dev/e2e/seed_pg.sql
          mysql -h 127.0.0.1 -u rivet -privet rivet < dev/e2e/seed_mysql.sql

      - name: Seed benchmark datasets
        run: |
          PGPASSWORD=rivet psql -h localhost -U rivet -d rivet -f dev/bench/seed_bench_pg.sql

      - name: Run all ignored integration tests
        env:
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          RIVET: ./target/release/rivet
        run: cargo test --release -- --ignored

      - name: Stop services
        if: always()
        run: docker compose down

  # ── benchmark smoke — compile + 1 sample ────────────────────────────────────

  bench-smoke:
    name: Benchmark smoke (compile + 1 warm sample)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Build benchmarks
        run: cargo build --benches --release

      # Run each benchmark group for a single warm sample to verify they
      # execute without panicking.  Not a regression gate — just a smoke test.
      - name: Smoke hot_paths
        run: cargo bench --bench hot_paths -- --warm-up-time 1 --measurement-time 1 --sample-size 10 2>/dev/null || true

      - name: Smoke resource_aware
        run: cargo bench --bench resource_aware -- --warm-up-time 1 --measurement-time 1 --sample-size 10 2>/dev/null || true

  # ── e2e benchmark runner ─────────────────────────────────────────────────────

  bench-e2e:
    name: E2E benchmark report (§4.3–4.6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Install GNU time
        run: sudo apt-get install -y time

      - name: Start Postgres
        run: |
          docker compose up -d postgres
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done

      - name: Build release
        run: cargo build --release

      - name: Seed benchmark datasets
        run: PGPASSWORD=rivet psql -h localhost -U rivet -d rivet -f dev/bench/seed_bench_pg.sql

      - name: Run benchmark suites
        env:
          RIVET: ./target/release/rivet
          POSTGRES_URL: ${{ env.POSTGRES_URL }}
        run: |
          bash dev/bench/run_bench.sh all | tee bench_report.md

      - name: Upload benchmark report
        uses: actions/upload-artifact@v4
        with:
          name: bench-report-${{ github.run_id }}
          path: bench_report.md

      - name: Stop services
        if: always()
        run: docker compose down

  # ── release gate ─────────────────────────────────────────────────────────────

  release-gate:
    name: Release gate (full checklist)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Unit tests
        run: cargo test --lib

      - name: Integration tests (no docker)
        run: cargo test --test format_golden --test invariants --test journal_invariants --test recovery

      - name: Stability gate
        run: |
          cargo test --lib -- pipeline::sink::tests
          cargo test --lib -- plan::validate::tests

      - name: Release build
        run: cargo build --release

      - name: Security audit
        run: cargo audit || true

      - name: Version sanity
        run: ./target/release/rivet --version
