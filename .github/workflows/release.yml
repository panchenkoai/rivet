name: Release

# Creates a GitHub Release with prebuilt binaries when EITHER:
#   1) You push a version tag:  git tag v0.2.0-beta.1 && git push origin v0.2.0-beta.1
#   2) You run this workflow manually (Actions → Release → Run workflow) after the tag exists on GitHub.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.2.0-beta.1) — create & push the tag first"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  semantic-gates:
    name: Semantic release gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          key: semantic-gates
      - name: Invariant tests
        run: cargo test --test invariants --test journal_invariants
      - name: Recovery tests
        run: cargo test --test recovery
      - name: Compatibility matrix tests
        run: cargo test --lib -- plan::validate::tests

  publish-crate:
    name: Publish to crates.io
    needs: semantic-gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
        with:
          key: publish-crate
      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  build:
    name: Build ${{ matrix.target }}
    needs: semantic-gates
    runs-on: ${{ matrix.os }}
    env:
      # Correct tag in tarball names when workflow is started manually (GITHUB_REF is then a branch).
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (glibc) — most servers and desktops
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          # macOS — Apple Silicon + Intel (GitHub-hosted)
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          tag="${RELEASE_TAG}"
          dir="rivet-${tag}-${{ matrix.target }}"
          mkdir "$dir"
          # Ship both binaries: `rivet` (extraction CLI) and `rivet-mcp`
          # (read-only DB introspection MCP server). Split landed in 0.6.0.
          cp "target/${{ matrix.target }}/release/rivet"     "$dir/"
          cp "target/${{ matrix.target }}/release/rivet-mcp" "$dir/"
          cp README.md LICENSE* CHANGELOG.md "$dir/" 2>/dev/null || true
          tar czf "${dir}.tar.gz" "$dir"
          echo "ASSET=${dir}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: rivet-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt

      # Pull the release notes for this tag straight out of CHANGELOG.md so
      # the published release body matches what's in the repo. The awk
      # program extracts everything from `## <version> ` up to (but not
      # including) the next `## <version>` heading.
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## " ver " "    { found = 1; next }
            found && /^## [0-9]/   { exit }
            found                  { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::CHANGELOG.md has no section starting with '## ${VERSION} ' — add one before tagging."
            exit 1
          fi
          echo "Extracted $(wc -l < release-notes.md) lines of notes for ${VERSION}."

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          body_path: release-notes.md
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt

      # Homebrew tap: https://github.com/<owner>/homebrew-rivet (create empty repo once).
      # Add repo secret HOMEBREW_TAP_GITHUB_TOKEN (fine-grained or classic PAT) with Contents: Read and write
      # on homebrew-rivet only.
      - name: Generate Homebrew formula
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          chmod +x dev/scripts/update_homebrew_formula.sh
          GITHUB_REPOSITORY="${{ github.repository }}" \
            ./dev/scripts/update_homebrew_formula.sh --tag "${RELEASE_TAG}" --sums-file artifacts/SHA256SUMS.txt

      - name: Push formula to Homebrew tap
        continue-on-error: true
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          TAP_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN}" ]; then
            echo "HOMEBREW_TAP_GITHUB_TOKEN not set, skipping tap push"
            exit 0
          fi
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${TAP_OWNER}/homebrew-rivet.git" homebrew-tap
          mkdir -p homebrew-tap/Formula
          cp packaging/homebrew/rivet.rb homebrew-tap/Formula/rivet.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/rivet.rb
          if git diff --cached --quiet; then
            echo "No changes to formula"
            exit 0
          fi
          git commit -m "rivet ${RELEASE_TAG}"
          # actions/checkout sets a *global* http.<github>.extraheader carrying
          # the repo-scoped GITHUB_TOKEN; it overrides the PAT embedded in the
          # clone URL and makes the cross-repo push fail with "password
          # authentication is not supported". Blank it for this push so git uses
          # the tap PAT from the origin URL.
          git -c http.https://github.com/.extraheader= push origin HEAD

  # Multi-arch Docker build using native runners.
  #
  # The previous setup built both archs on `ubuntu-latest` via QEMU
  # emulation of arm64 — correct, but the arm64 leg ran 4–6× slower
  # than the amd64 native step (heavy crates like `arrow` / `parquet`
  # would push the leg past 25 minutes).
  #
  # The pattern below splits the build:
  #   docker-build (matrix: amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm)
  #     → each leg runs natively, pushes a *digest* (no tag),
  #       exports it as an artifact
  #   docker-manifest (depends on the matrix)
  #     → downloads both digests and stitches them together into a
  #       multi-arch image tagged `:<release>` and `:latest`.
  #
  # Reference: docker/build-push-action README §Distribute build
  # across multiple runners.
  docker-build:
    name: Build (${{ matrix.platform }})
    needs: release
    runs-on: ${{ matrix.runner }}
    env:
      REGISTRY: ghcr.io
      IMAGE: ${{ github.repository_owner }}/rivet
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch_tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch_tag: arm64
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          # Push the image content under its content-addressed digest
          # only (no tag); the manifest job stitches the digests into
          # the final multi-arch tag.  `push-by-digest=true` is the
          # canonical knob for this two-step flow.
          outputs: type=image,name=ghcr.io/${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch_tag }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${digest#sha256:}" > "/tmp/digests/${{ matrix.arch_tag }}"

      - name: Upload digest
        uses: actions/upload-artifact@v5
        with:
          name: docker-digest-${{ matrix.arch_tag }}
          path: /tmp/digests/${{ matrix.arch_tag }}
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Assemble multi-arch manifest
    needs: docker-build
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
      REGISTRY: ghcr.io
      IMAGE: ${{ github.repository_owner }}/rivet
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all digests
        uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        run: |
          set -euo pipefail
          digests=$(ls /tmp/digests | sort)
          refs=""
          for arch_file in $digests; do
            digest=$(cat "/tmp/digests/${arch_file}")
            refs+=" ghcr.io/${IMAGE}@sha256:${digest}"
          done
          docker buildx imagetools create \
            --tag "ghcr.io/${IMAGE}:${RELEASE_TAG}" \
            --tag "ghcr.io/${IMAGE}:latest" \
            ${refs}

      - name: Inspect resulting image
        run: docker buildx imagetools inspect "ghcr.io/${IMAGE}:${RELEASE_TAG}"
