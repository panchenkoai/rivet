name: Nightly Live

# Heavy live tests that would slow down per-PR CI but must be exercised
# regularly so regressions in checkpoint/recovery/load-aware behaviour are
# caught before they ship.
#
# This workflow:
#   1. Brings up the full docker-compose stack including pgBouncer.
#   2. Seeds the `content_items` fixture (~2M rows, several minutes).
#   3. Runs `live_content_load` AND every other `#[ignore]` live test
#      against the seeded DB.
#
# Triggers: nightly cron (03:30 UTC) + manual dispatch.

on:
  schedule:
    # 03:30 UTC = roughly 06:30 CET / 23:30 ET — outside business hours so
    # a failure email arrives by morning and the dev box is unlikely to be
    # busy if the matrix is later expanded.
    - cron: "30 3 * * *"
  workflow_dispatch:
    # Manual button in the Actions UI: useful for verifying a fix on the
    # full live matrix without waiting for the next nightly window.

env:
  CARGO_TERM_COLOR: always

jobs:
  live-full:
    name: Full live suite (incl. content_load)
    # Heavier than the per-PR `e2e` job — give it more time.
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3

      # ubuntu-latest ships ~14 GB free. This job runs a release build +
      # release test rebuild + 7 docker images + the 60K-row content_items
      # fixture. Without freeing pre-installed toolchains the worker has
      # been hitting disk pressure mid-test (cf. recent failures at
      # 6a4c5af landing — exit 101 with no clear test annotation because
      # cargo's stderr write fails under ENOSPC). Same fix as the `e2e`
      # job in ci.yml; ~30 GB headroom for ~15 s wall.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          swap-storage: false
      - name: Disk snapshot — pre-build
        run: df -h /

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Start services
        # `proxysql` lives in the same `pool` docker-compose profile as
        # `pgbouncer` and is required by tests/live_pool_safety.rs MySQL
        # tests (`mysql_proxysql_*`); without it those tests fail in
        # `require_alive(LiveService::ProxySql)` before ever running.
        #
        # `duckdb` + `clickhouse` live in the `loaders` profile and back the
        # cross-engine type-roundtrip suite (tests/type_roundtrip.rs). Without
        # them the `--ignored` run fails 13 tests with `No such object:
        # rivet-duckdb` / `ClickHouse reachable on 127.0.0.1:8123` (pyarrow_*
        # cases also go through the shared rivet-duckdb exec helper).
        run: |
          # Same .live-tmp prolog as ci.yml's jobs: pre-create runner-owned
          # (the daemon would root-own a missing bind-mount source), then
          # re-open after ClickHouse chowns /work to uid 101 on boot. Without
          # it every test that writes a shared workdir EACCESes — the first
          # nightly after the cdc-oracle suite landed failed exactly there.
          mkdir -p tests/.live-tmp
          docker compose --profile pool --profile loaders --profile cdc --profile replica up -d postgres mysql mssql minio fake-gcs azurite toxiproxy pgbouncer proxysql duckdb clickhouse postgres-cdc mysql-cdc mssql-cdc mysql-primary mysql-replica
          sudo chmod -R 0777 tests/.live-tmp

      - name: Wait for services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do docker compose exec -T mysql mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done
          echo "Waiting for pgBouncer..."
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/6432) 2>/dev/null && break || sleep 1; done
          echo "Waiting for ProxySQL..."
          # 6033 is the client-facing MySQL protocol port; 6032 admin comes
          # up first but we wait for 6033 so backend wiring is in place.
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/6033) 2>/dev/null && break || sleep 1; done
          echo "Waiting for Azurite..."
          # Blob emulator on :10000 — cloud_multipart_azure_* needs it. It was missing
          # from `up` here (ci.yml has it) and panicked the whole nightly suite nightly.
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/10000) 2>/dev/null && break || sleep 1; done
          echo "Waiting for ClickHouse..."
          # HTTP :8123/ping — the type_roundtrip clickhouse_load tests connect here.
          for i in $(seq 1 30); do curl -sf localhost:8123/ping >/dev/null 2>&1 && break || sleep 2; done
          echo "Waiting for duckdb loader..."
          # Long-running exec container; wait until its `import duckdb` healthcheck passes.
          for i in $(seq 1 30); do [ "$(docker inspect -f '{{.State.Health.Status}}' rivet-duckdb 2>/dev/null)" = "healthy" ] && break || sleep 2; done
          echo "Waiting for SQL Server..."
          # sqlcmd SELECT-1 healthcheck (start_period 30s); the live_mssql_* suites
          # connect + seed against it.
          for i in $(seq 1 40); do [ "$(docker inspect -f '{{.State.Health.Status}}' rivet-mssql 2>/dev/null)" = "healthy" ] && break || sleep 2; done
          echo "Waiting for CDC services (cdc profile)..."
          for i in $(seq 1 30); do docker compose exec -T postgres-cdc pg_isready -U rivet && break || sleep 2; done
          for i in $(seq 1 30); do docker compose exec -T mysql-cdc mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done
          for i in $(seq 1 40); do docker compose exec -T mssql-cdc /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Rivet_Passw0rd!' -C -Q 'SELECT 1' >/dev/null 2>&1 && break || sleep 2; done
          docker compose exec -T mssql-cdc /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Rivet_Passw0rd!' -C -Q "IF DB_ID('rivet') IS NULL CREATE DATABASE rivet;"

      - name: Build release (rivet + seed)
        # `--bin seed` builds the auxiliary src/bin/seed.rs target on top of
        # the default `rivet` binary so the heavy content_items fixture can
        # be populated without `cargo run`'s rebuild overhead. The seed bin is
        # gated behind the off-by-default `dev-seed` feature (so `cargo install`
        # never ships the destructive TRUNCATE tool), hence `--features dev-seed`.
        run: cargo build --release --bin rivet --bin seed --features dev-seed

      - name: Seed light fixtures (orders, etc.)
        run: |
          PGPASSWORD=rivet psql -h localhost -U rivet -d rivet -f dev/e2e/seed_pg.sql
          mysql -h 127.0.0.1 -u rivet -privet rivet < dev/e2e/seed_mysql.sql

      - name: Seed MSSQL database
        # Create the `rivet` database (no init hook in the SQL Server image) so
        # the live_mssql_* recovery/resume/reconcile suites can connect + seed
        # their own per-test tables.
        run: |
          docker compose cp dev/mssql/init.sql mssql:/tmp/init.sql
          docker compose exec -T mssql /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Rivet_Passw0rd!' -C -i /tmp/init.sql

      - name: Seed heavy fixture (content_items)
        # tests/live_content_load.rs asserts count >= 50_000 for the
        # `pg_content_export_under_update_pressure` test. Use a leaner
        # 60k-row fixture (~1 min) — that's enough to trigger WAL pressure
        # without inflating CI wall time with millions of rows.
        # The `pg_full_content_export_max_pressure` test requires 1M rows
        # and is intentionally not exercised here (still manual-only).
        # RIVET_SEED_I_KNOW=1 confirms the destructive TRUNCATE...CASCADE the
        # seed tool runs (the runtime safety gate; CI fixtures are throwaway).
        run: |
          RIVET_SEED_I_KNOW=1 ./target/release/seed \
            --target postgres \
            --users 1000 \
            --orders-per-user 5 \
            --events-per-user 5 \
            --page-views 5000 \
            --content-items 60000

      - name: Disk snapshot — post-build
        run: df -h /

      - name: Run FULL live suite (skip 1M-row stress + the type-validator job's tests)
        # Everything #[ignore]d — light suite (also covered by per-PR e2e,
        # which is cheap insurance against docker-compose regressions like
        # an image tag breaking pgBouncer) plus content_export_under_update.
        # Skips the 1M-row "max_pressure" test that genuinely takes 3–5 min
        # even when seeded; leave that one for manual runs.
        #
        # `validates`, `edge_cases`, and the `via_duckdb` differential tests
        # stay skipped for TIME, not permissions (the .live-tmp prolog above
        # now provisions the shared mount here too): all three have a
        # dedicated home in ci.yml's `test-type-validators` job on every PR.
        run: |
          cargo test --release -- --ignored \
            --skip full_content_export_max_pressure \
            --skip validates --skip edge_cases --skip via_duckdb

      - name: Dump service logs on failure
        if: failure()
        run: |
          echo "::group::postgres"
          docker compose logs --no-color postgres | tail -200
          echo "::endgroup::"
          echo "::group::mysql"
          docker compose logs --no-color mysql | tail -200
          echo "::endgroup::"
          echo "::group::pgbouncer"
          docker compose logs --no-color pgbouncer | tail -200
          echo "::endgroup::"
          echo "::group::proxysql"
          docker compose logs --no-color proxysql | tail -200
          echo "::endgroup::"

      - name: Stop services
        if: always()
        run: docker compose down -v

  # Mutation testing over the CDC surface — the meta-gate: a surviving mutant
  # names a test blind spot. Scoped to the modules where the 2026-07 campaign
  # found 33 defects (whole-crate mutants would take hours). Offline tests
  # only — live tests are #[ignore]d, so mutants runs the cheap suite.
  mutants-cdc:
    name: cargo-mutants (CDC modules)
    timeout-minutes: 50
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Mutants over CDC + checksum + decimal canon
        run: |
          cargo mutants --no-shuffle -vV \
            -f src/source/cdc/value.rs \
            -f src/source/cdc/sink.rs \
            -f src/source/postgres/cdc.rs \
            -f src/source/value_checksum.rs \
            -f src/types/decimal.rs \
            -- --tests
      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutants-out
          path: mutants.out

  # Version-matrix scout lane (staff class #3): the CDC conformance subset
  # against non-default engine tags. continue-on-error — a red cell here is a
  # FINDING to triage (e.g. MySQL 8.4 removed SHOW MASTER STATUS), not a
  # blocker; promote a tag to the main lane once green.
  cdc-version-scout:
    name: CDC vs ${{ matrix.engine }}:${{ matrix.tag }}
    timeout-minutes: 30
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - { engine: mysql, tag: "8.4", env: MYSQL_CDC_TAG }
          - { engine: mysql, tag: "5.7", env: MYSQL_CDC_TAG }
          - { engine: postgres, tag: "13", env: POSTGRES_CDC_TAG }
          - { engine: postgres, tag: "17", env: POSTGRES_CDC_TAG }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start the CDC stack at the scouted tag
        run: |
          export ${{ matrix.env }}=${{ matrix.tag }}
          docker compose --profile cdc up -d mysql-cdc postgres-cdc
      - name: Conformance subset
        run: |
          if [ "${{ matrix.engine }}" = "mysql" ]; then
            FILTER="live_cdc::cdc_"
          else
            FILTER="live_cdc::pg_cdc_"
          fi
          cargo test --test live_suite -- --ignored "$FILTER" \
            --skip gcs --skip toxiproxy 2>&1 | tail -20
      - name: Stop services
        if: always()
        run: docker compose down -v

  # Weekly 45-minute CDC soak (staff class #5): scheduler-style bounded runs
  # against continuous churn; asserts zero gaps across the whole window and a
  # flat RSS trend (last-quarter peak <= 1.5x first-quarter). Sundays only —
  # gate on the schedule day so the nightly stays fast.
  soak-cdc:
    name: CDC soak (weekly)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sunday gate
        id: day
        run: echo "sunday=$([ "$(date -u +%u)" = "7" ] && echo yes || echo no)" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        if: steps.day.outputs.sunday == 'yes'
      - uses: Swatinem/rust-cache@v2
        if: steps.day.outputs.sunday == 'yes'
      - name: Start CDC stack
        if: steps.day.outputs.sunday == 'yes'
        run: docker compose --profile cdc up -d mysql-cdc
      - name: Build + soak 45m
        if: steps.day.outputs.sunday == 'yes'
        run: |
          # duckdb is NOT in Ubuntu's apt archives — install the official
          # binary and verify it, or the soak's gap check cannot run (and it
          # now fails loud rather than silently skipping).
          curl -fsSL https://install.duckdb.org | sh
          export PATH="$HOME/.duckdb/cli/latest:$PATH"
          duckdb --version
          cargo build --release
          scripts/soak_cdc.sh 45 target/release/rivet
      - name: Stop services
        if: always()
        run: docker compose down -v
