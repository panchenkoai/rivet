name: CI

# Required branch-protection checks (set in Settings → Branches → main):
#   fmt · clippy · test · test-invariants · test-recovery · test-compatibility ·
#   test-stability · test-type-validators
#
# The semantic-gate jobs below run each suite in isolation so GitHub can
# block merges on named regressions, not just overall build failures.
# `test-type-validators` brings up the DuckDB/ClickHouse oracle containers so
# the type round-trip suite (previously only runnable by hand via the Makefile)
# is enforced on every PR.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  # CI debug builds keep line-tables only (file:line in panics is enough for
  # triage) — not full DWARF. This shrinks the debug `target/` and the link
  # working set, speeding every `cargo test`/`cargo build` job and easing disk
  # pressure (the lld-SIGBUS-on-ENOSPC failure mode). Only affects the `dev`
  # profile; the `build-release` job's release artifact is unchanged.
  CARGO_PROFILE_DEV_DEBUG: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: rustfmt
      # `cargo fmt --check` only needs the source tree, but we share a
      # cache key with the other jobs so a cold runner doesn't pay the
      # toolchain-extract cost twice on the same PR.
      - uses: Swatinem/rust-cache@v2
        with:
          key: fmt
          # `cargo fmt` doesn't touch `target/`; skip caching it to keep
          # the cache restore cheap.
          cache-targets: "false"
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      # `cargo test --all-targets` links every integration-test binary in the
      # DEBUG profile — each statically links the full dep tree (arrow / parquet
      # / openssl / ring / tiberius) with full debug info, hundreds of MB apiece.
      # As the suite grew (live_differential / live_crash_soak / live_chunked_dense
      # / sec_exit_codes …) the link working-set crossed ubuntu-latest's ~14 GB
      # free, and `lld` (mmap-backed output) faults on the full disk with
      # `ld terminated with signal 7 [Bus error]` — surfacing as a non-obvious
      # exit 101. Same free-disk fix the e2e job already uses (~30 GB, ~15 s).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          swap-storage: false
      - run: cargo test --all-targets

  test-invariants:
    name: Invariant tests (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test invariants --test journal_invariants

  test-recovery:
    name: Recovery tests (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test recovery

  test-compatibility:
    name: Compatibility matrix tests (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib -- plan::validate::tests

  test-types:
    name: Type mapping contracts (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test type_roundtrip contract_

  test-stability:
    name: Stability tests — Phase 1 (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - name: Format & row-group golden tests
        run: cargo test --test format_golden
      - name: Sink unit tests (quality cap, auto_shrink)
        run: cargo test --lib -- pipeline::sink::tests
      - name: Plan validate unit tests
        run: cargo test --lib -- plan::validate::tests

  test-type-golden:
    name: Type-golden tests (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Start databases
        run: docker compose up -d postgres mysql

      - name: Wait for databases
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do docker compose exec -T mysql mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done

      - name: Run type-golden tests
        run: cargo test --test live_type_golden -- --ignored

      - name: Stop services
        if: always()
        run: docker compose down

  test-type-validators:
    name: Type round-trip validators — DuckDB · ClickHouse · pyarrow (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Pre-create shared bind-mount dir (runner-owned)
        # The duckdb/clickhouse services mount ./tests/.live-tmp:/work. On Linux
        # the docker daemon creates a missing bind-mount source as root:root,
        # which then blocks the test process (runner user) from creating
        # per-test workdirs under it (`create_dir_all` → EACCES). Pre-creating
        # it makes the mount source runner-owned; the root containers only read
        # the Parquet the test writes there.
        run: mkdir -p tests/.live-tmp

      - name: Start source + oracle containers
        # postgres/mysql/mssql are the sources; duckdb + clickhouse are
        # independent Parquet *readers* (ADR-0014 oracles) that read back what
        # rivet wrote and assert field-by-field type fidelity. The duckdb image
        # pip-installs duckdb/pytz/pyarrow on boot, so `--wait` blocks on its
        # healthcheck (start_period 30s) before tests run. The reader containers
        # share the ./tests/.live-tmp:/work bind mount they glob over.
        run: docker compose up -d --wait postgres mysql duckdb clickhouse mssql

      - name: Seed MSSQL database
        # The SQL Server image has no /docker-entrypoint-initdb.d hook, so create
        # the `rivet` database via dev/mssql/init.sql once the container is
        # healthy (`--wait` blocked on its SELECT-1 healthcheck). The
        # type-roundtrip validators create their per-test matrix tables inside it.
        run: |
          docker compose cp dev/mssql/init.sql mssql:/tmp/init.sql
          docker compose exec -T mssql /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Rivet_Passw0rd!' -C -i /tmp/init.sql

      - name: Reopen shared mount after ClickHouse chowns it
        # ClickHouse chowns its user_files_path (/work = ./tests/.live-tmp) to
        # the clickhouse uid (101) on startup. On Linux that propagates to the
        # host and re-locks the dir the runner just created, so `create_dir_all`
        # still fails with EACCES. Re-open it after the stack is up; the test
        # writes per-run workdirs (world-readable), the reader containers read
        # them back.
        run: sudo chmod -R 0777 tests/.live-tmp

      - name: Run type round-trip validators
        # Force the `#[ignore]`d live validators to run. `--skip bigquery`
        # drops the two cloud-warehouse tests — they need a real GCP project +
        # `bq` CLI that CI has no credentials for (covered by the manual
        # `make test-types-bigquery` target instead).
        run: cargo test --test type_roundtrip -- --include-ignored --skip bigquery

      - name: Differential correctness at scale (DuckDB vs source)
        # tests/live_differential.rs — an INDEPENDENT reader (DuckDB) fingerprints
        # the exported Parquet and must agree with the source field-for-field
        # (count, integer sums, distinct id/text). Two cases: a clean chunked
        # export, and a crash + resume (raw count proves the at-least-once
        # surplus; `SELECT DISTINCT *` collapses to the exactly-once set == source).
        # Lives here, not the e2e job: needs the `duckdb` reader + the
        # ./tests/.live-tmp:/work shared mount this job already provisions.
        run: cargo test --test live_differential -- --ignored

      - name: Stop services
        if: always()
        run: docker compose down

  build-release:
    name: Release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  e2e:
    name: E2E matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      # GitHub-hosted ubuntu-latest ships with ~14 GB free on `/`. This job
      # then asks for ~3 GB of toolchain + ~3-4 GB of `cargo build --release`
      # target + another ~3-5 GB of test-profile rebuild + 7 docker images
      # (postgres / mysql / minio / fake-gcs / toxiproxy / pgbouncer /
      # proxysql) + seed fixtures + per-test temp output. Headroom is gone
      # before the test step starts, and a worker hitting ENOSPC mid-run
      # surfaces as a non-obvious `Process completed with exit code 101`
      # because cargo's diagnostic gets garbled when stderr write fails.
      # The action below removes the pre-installed .NET / Android SDK /
      # Haskell GHC / CodeQL / dotnet caches Rivet never touches, freeing
      # ~30 GB. Cheap (~15 s wall) and the recommended fix per
      # https://github.com/actions/runner-images/issues/2840.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false # keeps the action fast; the big wins are below
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          swap-storage: false # leave swap (host may need it under load)
      - name: Disk snapshot — pre-build
        run: df -h /

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Start services
        # Include `toxiproxy` so the retry / chaos / crash-recovery live-test
        # binaries have the proxy admin API available on :8474.
        # `--profile pool` brings up pgBouncer (transaction mode, pool_size=1)
        # for the live_pool_safety regression suite — the F1–F6 / G1 DBA-audit
        # fixes silently rot without it. `proxysql` lives in the same `pool`
        # profile and is required by the new MySQL `mysql_proxysql_*` tests in
        # tests/live_pool_safety.rs (added in 0.6.0); without it
        # `require_alive(LiveService::ProxySql)` panics before the test runs.
        run: docker compose --profile pool --profile cdc up -d postgres mysql mssql minio fake-gcs azurite toxiproxy pgbouncer proxysql postgres-cdc mysql-cdc mssql-cdc

      - name: Wait for services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do docker compose exec -T mysql mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done
          echo "Waiting for pgBouncer..."
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/6432) 2>/dev/null && break || sleep 1; done
          echo "Waiting for ProxySQL..."
          # 6033 is the client-facing MySQL protocol port; 6032 admin comes
          # up first but we wait for 6033 so backend wiring is in place.
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/6033) 2>/dev/null && break || sleep 1; done
          echo "Waiting for Azurite..."
          # Blob emulator on :10000 — the live_azure_multipart suite lists/reads
          # blobs over HTTP and creates its container via the (preinstalled) az CLI.
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/10000) 2>/dev/null && break || sleep 1; done
          echo "Waiting for SQL Server..."
          # mssql has a sqlcmd SELECT-1 healthcheck (start_period 30s); wait on it
          # so the live_mssql_* suites can connect + seed.
          for i in $(seq 1 40); do [ "$(docker inspect -f '{{.State.Health.Status}}' rivet-mssql 2>/dev/null)" = "healthy" ] && break || sleep 2; done
          echo "Waiting for CDC services (cdc profile)..."
          # Dedicated CDC instances: logical WAL (PostgreSQL :5434), a REPLICATION
          # grant (MySQL :3307), the SQL Server Agent (MSSQL :1434).
          for i in $(seq 1 30); do docker compose exec -T postgres-cdc pg_isready -U rivet && break || sleep 2; done
          for i in $(seq 1 30); do docker compose exec -T mysql-cdc mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done
          for i in $(seq 1 40); do docker compose exec -T mssql-cdc /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Rivet_Passw0rd!' -C -Q 'SELECT 1' >/dev/null 2>&1 && break || sleep 2; done

      - name: Build rivet (debug)
        # Debug, not --release: the e2e suite exercises CORRECTNESS, not
        # throughput, on small seeded fixtures, so the fat-LTO release build
        # (codegen-units=1 → ~22 min link) buys nothing here. Debug builds in
        # ~2-3 min. The shipping artifact is still validated by the dedicated
        # `build-release` job, which keeps the full release profile.
        run: cargo build

      - name: Seed databases
        run: |
          PGPASSWORD=rivet psql -h 127.0.0.1 -U rivet -d rivet -f dev/e2e/seed_pg.sql
          mysql -h 127.0.0.1 -u rivet -privet rivet < dev/e2e/seed_mysql.sql

      - name: Seed MSSQL database
        # The SQL Server image has no init hook; create the `rivet` database via
        # dev/mssql/init.sql (sqlcmd ships inside the container). The live_mssql_*
        # suites create their own per-test tables but need the database to exist.
        run: |
          docker compose cp dev/mssql/init.sql mssql:/tmp/init.sql
          docker compose exec -T mssql /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Rivet_Passw0rd!' -C -i /tmp/init.sql

      - name: Seed MSSQL-CDC database
        # The mssql-cdc instance (Agent on) also has no init hook; just create the
        # `rivet` database — the CDC tests enable CDC + create their own tables.
        run: |
          docker compose exec -T mssql-cdc /opt/mssql-tools18/bin/sqlcmd \
            -S localhost -U sa -P 'Rivet_Passw0rd!' -C \
            -Q "IF DB_ID('rivet') IS NULL CREATE DATABASE rivet;"

      - name: Run E2E test suite
        env:
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          RIVET: ./target/debug/rivet
        run: bash dev/e2e/run_e2e.sh

      - name: Disk snapshot — post-build
        # Surfaces remaining headroom for the test-profile recompile + per-
        # test output below. If a future regression burns through the buffer,
        # the diff between pre/post is the smoking gun.
        run: df -h /

      - name: Run live cargo integration tests
        # Activates every `tests/live_*.rs` binary that is `#[ignore]`d by
        # default (Phase A–G of the QA backlog).  Cross-process synchronisation
        # on the shared Toxiproxy admin API is enforced by an flock-based
        # `toxiproxy_guard` in `tests/common/mod.rs`.
        #
        # Skip the heavy `content_export` tests — they assert a 50K+ row
        # `content_items` fixture that takes minutes to seed and is exercised
        # by the `nightly-live` workflow instead.
        #
        # Skip the type round-trip oracle tests (`validates` = duckdb/clickhouse/
        # pyarrow readers; `edge_cases` = the duckdb-backed pg_edge_cases AND
        # mysql_edge_cases modules). They need the DuckDB/ClickHouse containers
        # this job does not start and run in the dedicated `test-type-validators`
        # job instead. Both substrings are unique to the `type_roundtrip` binary.
        # `--skip via_duckdb` excludes tests/live_differential.rs: it hard-requires
        # the `duckdb` reader container (require_alive(DuckDb)) + the
        # ./tests/.live-tmp:/work shared mount, neither of which this job sets up.
        # It runs in the `test-type-validators` job instead (which has both).
        # live_crash_soak.rs stays here — it re-reads the destination in-process
        # (arrow/parquet-rs), no duckdb needed.
        run: cargo test -- --ignored --skip content_export --skip validates --skip edge_cases --skip via_duckdb

      - name: Stop services
        if: always()
        run: docker compose down

  cli-matrix:
    name: PR regression matrices (cli + cfg + path)
    runs-on: ubuntu-latest
    # Shell-based regression guards under dev/matrices/. Catches UX and
    # config-surface regressions that unit tests miss. See dev/matrices/README.md.
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Start databases
        run: docker compose up -d postgres mysql

      - name: Wait for databases
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do docker compose exec -T mysql mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done

      - name: Build rivet (debug)
        # Debug, not --release: the matrices probe CLI / config / path SURFACE
        # behavior, not throughput, so the fat-LTO release build buys nothing.
        # `stage_rivet.sh` honours $RIVET_BIN, so point it at the debug binary.
        run: cargo build --bin rivet

      - name: Create matrix navigation links
        env:
          RIVET_BIN: ${{ github.workspace }}/target/debug/rivet
        run: bash dev/matrices/setup_links.sh

      - name: Run PR matrix tier
        env:
          RIVET_BIN: ${{ github.workspace }}/target/debug/rivet
        run: bash dev/matrices/run.sh --tier=pr --skip-compose | tee dev/matrices/run.log

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: matrices-pr-logs
          path: |
            dev/cli_matrix/logs/
            dev/cfg_matrix/logs/
            dev/path_matrix/logs/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose down

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
      # Run cargo-audit directly (prebuilt binary, no compile) so it honors the
      # accepted-advisory list in `.cargo/audit.toml` — the single source of
      # truth shared with the `.githooks/pre-commit` hook. The previous
      # `rustsec/audit-check` action did not reliably read that file, so the
      # MSSQL driver's unavoidable tiberius→rustls-0.21 advisories failed the
      # gate; documenting + tracking them in one place keeps the gate green
      # while still catching every *fixable* future advisory.
      - uses: taiki-e/install-action@v2.81.1
        with:
          tool: cargo-audit
      - run: cargo audit
