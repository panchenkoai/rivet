name: CI

# Required branch-protection checks (set in Settings → Branches → main):
#   fmt · clippy · test · test-invariants · test-recovery · test-compatibility · test-stability
#
# The three semantic-gate jobs below run each suite in isolation so GitHub can
# block merges on named regressions, not just overall build failures.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: rustfmt
      # `cargo fmt --check` only needs the source tree, but we share a
      # cache key with the other jobs so a cold runner doesn't pay the
      # toolchain-extract cost twice on the same PR.
      - uses: Swatinem/rust-cache@v2
        with:
          key: fmt
          # `cargo fmt` doesn't touch `target/`; skip caching it to keep
          # the cache restore cheap.
          cache-targets: "false"
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-targets

  test-invariants:
    name: Invariant tests (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test invariants --test journal_invariants

  test-recovery:
    name: Recovery tests (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --test recovery

  test-compatibility:
    name: Compatibility matrix tests (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib -- plan::validate::tests

  test-stability:
    name: Stability tests — Phase 1 (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - name: Format & row-group golden tests
        run: cargo test --test format_golden
      - name: Sink unit tests (quality cap, auto_shrink)
        run: cargo test --lib -- pipeline::sink::tests
      - name: Plan validate unit tests
        run: cargo test --lib -- plan::validate::tests

  test-type-golden:
    name: Type-golden tests (semantic gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Start databases
        run: docker compose up -d postgres mysql

      - name: Wait for databases
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do docker compose exec -T mysql mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done

      - name: Run type-golden tests
        run: cargo test --release --test live_type_golden -- --ignored

      - name: Stop services
        if: always()
        run: docker compose down

  build-release:
    name: Release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release

  e2e:
    name: E2E matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Start services
        # Include `toxiproxy` so the retry / chaos / crash-recovery live-test
        # binaries have the proxy admin API available on :8474.
        # `--profile pool` brings up pgBouncer (transaction mode, pool_size=1)
        # for the live_pool_safety regression suite — the F1–F6 / G1 DBA-audit
        # fixes silently rot without it. `proxysql` lives in the same `pool`
        # profile and is required by the new MySQL `mysql_proxysql_*` tests in
        # tests/live_pool_safety.rs (added in 0.6.0); without it
        # `require_alive(LiveService::ProxySql)` panics before the test runs.
        run: docker compose --profile pool up -d postgres mysql minio fake-gcs toxiproxy pgbouncer proxysql

      - name: Wait for services
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do docker compose exec -T mysql mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done
          echo "Waiting for pgBouncer..."
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/6432) 2>/dev/null && break || sleep 1; done
          echo "Waiting for ProxySQL..."
          # 6033 is the client-facing MySQL protocol port; 6032 admin comes
          # up first but we wait for 6033 so backend wiring is in place.
          for i in $(seq 1 30); do (exec 3<>/dev/tcp/127.0.0.1/6033) 2>/dev/null && break || sleep 1; done

      - name: Build release
        run: cargo build --release

      - name: Seed databases
        run: |
          PGPASSWORD=rivet psql -h localhost -U rivet -d rivet -f dev/e2e/seed_pg.sql
          mysql -h 127.0.0.1 -u rivet -privet rivet < dev/e2e/seed_mysql.sql

      - name: Run E2E test suite
        env:
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          RIVET: ./target/release/rivet
        run: bash dev/e2e/run_e2e.sh

      - name: Run live cargo integration tests
        # Activates every `tests/live_*.rs` binary that is `#[ignore]`d by
        # default (Phase A–G of the QA backlog).  Cross-process synchronisation
        # on the shared Toxiproxy admin API is enforced by an flock-based
        # `toxiproxy_guard` in `tests/common/mod.rs`.
        #
        # Skip the heavy `content_export` tests — they assert a 50K+ row
        # `content_items` fixture that takes minutes to seed and is exercised
        # by the `nightly-live` workflow instead.
        run: cargo test --release -- --ignored --skip content_export

      - name: Stop services
        if: always()
        run: docker compose down

  cli-matrix:
    name: CLI behaviour matrix (regression guard)
    runs-on: ubuntu-latest
    # The harness drives the actual binary through every subcommand x
    # flag combination against the docker fixtures and pins exit
    # codes per scenario.  Catches UX regressions that unit tests and
    # focused `tests/live_*.rs` integration tests miss — e.g. an exit
    # code drift (F-NEW-A in the 0.7.5 audit) or a default-flag
    # behaviour change.  See dev/cli_matrix/README.md for rationale.
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@v2

      - name: Start databases
        run: docker compose up -d postgres mysql

      - name: Wait for databases
        run: |
          echo "Waiting for Postgres..."
          for i in $(seq 1 30); do docker compose exec -T postgres pg_isready -U rivet && break || sleep 2; done
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do docker compose exec -T mysql mysqladmin ping -h localhost -uroot -privet 2>/dev/null && break || sleep 2; done

      - name: Build release rivet
        run: cargo build --bin rivet --release

      - name: Stage rivet inside matrix dir
        run: cp target/release/rivet dev/cli_matrix/rivet

      - name: Seed pa_audit fixture
        run: bash dev/cli_matrix/seed.sh

      - name: Run CLI matrix
        # `--output` directories are created by the harness from the
        # cfg/*.yaml files; logs go under dev/cli_matrix/logs/matrix/.
        # Failure here means an exit code or stderr/stdout shape
        # diverged from what the baseline expects.
        run: bash dev/cli_matrix/matrix.sh | tee dev/cli_matrix/run.log

      - name: Verify no scenario regressed exit code
        # Pins the per-scenario exit codes captured during the 0.7.5
        # audit.  Any divergence is either an intentional change
        # (update this list in the same PR + CHANGELOG entry) or a
        # regression (block the PR).  See
        # dev/cli_matrix/expected_rc.txt for the baseline.
        run: bash dev/cli_matrix/check_rc.sh

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cli-matrix-logs
          path: dev/cli_matrix/logs/matrix/
          retention-days: 14

      - name: Stop services
        if: always()
        run: docker compose down

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ github.token }}
