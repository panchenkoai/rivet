# Dependabot keeps dependencies current so security patches and bug fixes flow
# in regularly instead of accumulating. Every PR it opens is gated by the full
# CI suite (fmt, clippy, the test matrix, AND `cargo audit`), so an update only
# merges if it is green — review the diff, then merge.
#
# Strategy (see docs/reference/testing.md):
#   * Routine crate churn is scoped to MAJOR (semver-breaking) bumps only and
#     grouped into ONE weekly PR. Minor/patch are ignored on purpose — they are
#     noise that rarely needs a human, and the ones that matter (security) arrive
#     out-of-band as security PRs regardless of this filter.
#   * A `cooldown` of 14 days holds every update back until two weeks after the
#     upstream release, so a freshly shipped `.0` (or a regressing point release)
#     never lands in the build before its first round of fixes.
#   * GitHub also opens out-of-band *security* PRs the moment an advisory with a
#     fix lands — that is how the accepted advisories in `.cargo/audit.toml`
#     (e.g. the `rand` entry, or tiberius's rustls bump) get retired. Those are
#     NOT subject to the cooldown, so a real CVE fix is never delayed. The
#     `cargo audit` gate (pre-commit + CI) is the hard backstop if a fixable
#     advisory ever slips past the routine schedule.
version: 2
updates:
  # ── Rust crates ──────────────────────────────────────────────────────────
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # Hold every bump for two weeks after its release — let other people hit the
    # fresh-release bugs first.
    cooldown:
      default-days: 14
    # Skip minor/patch churn entirely; only deliberate major bumps get a PR.
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-patch
    # One combined PR for the (major-only) churn, so the whole upgrade is
    # reviewed and CI'd together rather than as N racing branches.
    groups:
      cargo-major:
        applies-to: version-updates
        update-types:
          - major
    commit-message:
      prefix: deps
    labels:
      - dependencies

  # ── GitHub Actions used by the workflows ─────────────────────────────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    cooldown:
      default-days: 14
    # Action pins are low-risk; group all of them into one weekly PR.
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
    commit-message:
      prefix: ci
    labels:
      - dependencies
      - github-actions
