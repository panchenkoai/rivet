# sccache — compilation cache. It caches each crate's compiled output keyed on
# its inputs, so a clean rebuild (or a CI runner / Docker stage with a warm
# sccache) REUSES the ~500 dependency crates (arrow / parquet / tokio …) instead
# of recompiling them. The first build still compiles everything (and populates
# the cache); every subsequent from-scratch build then drops from ~30 min to a
# few minutes. This is the real lever against cold-build time — consolidation
# only sped the test-LINK phase, not the dependency compile.
#
# REQUIRES sccache on PATH: `brew install sccache` (or `cargo install sccache`).
# Without it, cargo errors "sccache: not found" — install it, or comment the
# wrapper line below out for a vanilla build.
[build]
rustc-wrapper = "sccache"
