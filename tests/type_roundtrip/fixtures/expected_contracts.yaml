  - { source: mysql, source_type: year, rivet_type: { kind: int16 }, arrow: Int16, fidelity: exact, tested: contract }
  - { source: mysql, source_type: boolean, rivet_type: { kind: bool }, arrow: Boolean, fidelity: exact, tested: contract }
