  - { source: mysql, source_type: char, rivet_type: { kind: string }, arrow: Utf8, fidelity: exact, tested: contract }
  - { source: mysql, source_type: longtext, rivet_type: { kind: text }, arrow: Utf8, fidelity: exact, tested: contract }
  - { source: mysql, source_type: mediumtext, rivet_type: { kind: text }, arrow: Utf8, fidelity: exact, tested: contract }
  - { source: mysql, source_type: enum, rivet_type: { kind: enum }, arrow: Utf8, fidelity: compatible, tested: contract }
