[package]
name = "rivet"
version = "0.1.0"
edition = "2024"
description = "CLI tool to export PostgreSQL and MySQL to Parquet/CSV (local, S3, GCS) with tuning, preflight checks, and SQLite-backed state."
readme = "README.md"
default-run = "rivet"

[dependencies]
anyhow = "1"
arrow = { version = "54", features = ["chrono-tz"] }
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
csv = "1"
env_logger = "0.11"
libc = "0.2"
mach2 = "0.4"
log = "0.4"
mysql = "25"
opendal = { version = "0.51", features = ["layers-blocking", "services-fs", "services-s3", "services-gcs"] }
parquet = { version = "54", features = ["arrow", "zstd", "lz4", "flate2"] }
clap_complete = "4"
postgres = "0.19"
rand = "0.8"
postgres-types = { version = "0.2", features = ["with-chrono-0_4"] }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tempfile = "3"
tokio = { version = "1.50.0", features = ["rt-multi-thread"] }
reqwest = { version = "0.13.2", features = ["blocking", "json"] }
xxhash-rust = { version = "0.8.15", features = ["xxh3"] }

[dev-dependencies]
bytes = "1"

[profile.release]
strip = true
lto = true
codegen-units = 1
opt-level = "z"
