source:
  type: postgres
  url: "postgresql://rivet:rivet@localhost:5432/rivet"
  tuning:
    batch_size: 100

exports:
  - name: users_split
    query: "SELECT id, name, email, age, balance, is_active, bio, created_at, updated_at FROM users"
    mode: full
    format: parquet
    max_file_size: 10KB
    destination:
      type: local
      path: ./dev/output
