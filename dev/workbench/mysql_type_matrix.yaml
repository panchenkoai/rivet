# rivet_type_matrix + rivet_type_matrix_full → Parquet (MySQL). Aliases match PG shape on the narrow export.
#
#   mkdir -p dev/output/type_matrix/mysql dev/output/type_matrix_full/mysql
#   rivet run --config dev/workbench/mysql_type_matrix.yaml --export type_matrix_mysql
#   rivet run --config dev/workbench/mysql_type_matrix.yaml --export type_matrix_full_mysql

source:
  type: mysql
  url: "mysql://rivet:rivet@localhost:3306/rivet"

exports:
  - name: type_matrix_mysql
    query: >-
      SELECT id, label, amount, fee,
             created_at_dt AS created_at,
             created_at_ts AS created_at_tz,
             raw_bytes, uid,
             extras AS attrs
      FROM rivet_type_matrix ORDER BY id
    mode: full
    format: parquet
    compression: zstd
    columns:
      amount: decimal(18,2)
      fee: decimal(18,6)
    destination:
      type: local
      path: ./dev/output/type_matrix/mysql

  - name: type_matrix_full_mysql
    query: "SELECT * FROM rivet_type_matrix_full ORDER BY id"
    mode: full
    format: parquet
    compression: zstd
    destination:
      type: local
      path: ./dev/output/type_matrix_full/mysql
