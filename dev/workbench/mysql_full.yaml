source:
  type: mysql
  url: "mysql://rivet:rivet@localhost:3306/rivet"

exports:
  - name: mysql_users_csv
    query: "SELECT id, name, email, age, balance, is_active, bio, created_at, updated_at FROM users"
    mode: full
    format: csv
    destination:
      type: local
      path: ./dev/output

  - name: mysql_users_parquet
    query: "SELECT id, name, email, age, balance, is_active, bio, created_at, updated_at FROM users"
    mode: full
    format: parquet
    destination:
      type: local
      path: ./dev/output

  - name: mysql_orders_parquet
    query: "SELECT id, user_id, product, quantity, price, status, notes, ordered_at, updated_at FROM orders"
    mode: full
    format: parquet
    destination:
      type: local
      path: ./dev/output
