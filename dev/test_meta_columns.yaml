source:
  type: postgres
  url: "postgresql://rivet:rivet@localhost:5432/rivet"

exports:
  - name: users_meta_test
    query: "SELECT id, name, email, age, created_at FROM users LIMIT 100"
    mode: full
    format: parquet
    meta_columns:
      exported_at: true
      row_hash: true
    destination:
      type: local
      path: ./dev/output
