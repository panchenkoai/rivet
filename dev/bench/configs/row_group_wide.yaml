# Row group strategy benchmark — wide text table (100 000 rows × 10 TEXT cols).
#
# Used to validate that row group auto-tuning reduces peak RSS on wide tables.
# Run four times changing `target_row_group_mb`: 32 | 64 | 128 | 256
#
# Metric to capture: wall time, peak RSS, output file size, row group count.
#
# Usage (from repo root):
#   TARGET_MB=128 ./dev/bench/run_bench.sh row_group

source:
  type: postgres
  url: "${POSTGRES_URL}"

exports:
  - name: bench_row_group
    query: "SELECT * FROM bench_wide"
    mode: full
    format: parquet
    compression_profile: balanced
    destination:
      type: local
      path: "${BENCH_OUT:-/tmp/rivet_bench}/row_group_${TARGET_MB:-128}mb"
    parquet:
      row_group_strategy: auto
      target_row_group_mb: "${TARGET_MB:-128}"
    tuning:
      batch_size: 10000
