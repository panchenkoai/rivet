# Compression profile benchmark — narrow numeric table (500 000 rows).
#
# Run four times changing `compression_profile`:
#   none | fast | balanced | compact
#
# Metric to capture: wall time, user CPU, output file size.
#
# Usage (from repo root):
#   COMPRESSION=balanced ./dev/bench/run_bench.sh compression

source:
  type: postgres
  url: "${POSTGRES_URL}"

exports:
  - name: bench_compression
    query: "SELECT id, score, category, flag, created_at FROM bench_narrow"
    mode: full
    format: parquet
    compression_profile: "${COMPRESSION:-balanced}"
    destination:
      type: local
      path: "${BENCH_OUT:-/tmp/rivet_bench}/compression_${COMPRESSION:-balanced}"
    tuning:
      batch_size: 50000
