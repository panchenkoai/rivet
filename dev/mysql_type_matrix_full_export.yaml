# Export `rivet_type_matrix_full` → Parquet (bool/TINYINT(1), BIT, TINYINT,
# DATE, TIME, YEAR, ENUM, VARBINARY, BLOB).
# Prerequisites: dev/mysql/init.sql applied (fresh compose volume) OR
# `dev/sql/rivet_type_matrix_full_mysql.sql` piped through mysql.
#
# Usage:
#   mkdir -p dev/output/type_matrix_full/mysql
#   rivet run --config dev/mysql_type_matrix_full_export.yaml --export type_matrix_full_mysql

source:
  type: mysql
  url: "mysql://rivet:rivet@localhost:3306/rivet"

exports:
  - name: type_matrix_full_mysql
    query: "SELECT * FROM rivet_type_matrix_full ORDER BY id"
    mode: full
    format: parquet
    compression: zstd
    destination:
      type: local
      path: ./dev/output/type_matrix_full/mysql
