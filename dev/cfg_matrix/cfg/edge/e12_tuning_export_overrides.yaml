# Export-level tuning takes precedence over source-level. Pin so a refactor
# that flips the merge precedence is caught.
source:
  type: postgres
  url_env: PG_URL
  tuning:
    profile: balanced
    batch_size: 1000
exports:
  - name: pa_audit
    query: "SELECT id, name FROM pa_audit"
    mode: full
    format: parquet
    destination: { type: local, path: ./out/e12 }
    tuning:
      batch_size: 100
