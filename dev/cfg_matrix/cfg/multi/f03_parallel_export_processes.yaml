source: { type: postgres, url_env: PG_URL }
parallel_export_processes: true
exports:
  - name: pa_audit_a
    query: "SELECT id, name FROM pa_audit WHERE id <= 10"
    mode: full
    format: parquet
    destination: { type: local, path: ./out/f03_a }
  - name: pa_audit_b
    query: "SELECT id, name FROM pa_audit WHERE id > 10"
    mode: full
    format: parquet
    destination: { type: local, path: ./out/f03_b }
