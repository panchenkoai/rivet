source: { type: postgres, url_env: PG_URL }
notifications:
  slack:
    webhook_url: "https://hooks.slack.example/notreal"
    on: [failure, schema_change]
exports:
  - name: pa_audit
    query: "SELECT id, name FROM pa_audit"
    mode: full
    format: parquet
    destination: { type: local, path: ./out/f04 }
