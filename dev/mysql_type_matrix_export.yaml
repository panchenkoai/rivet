# Export `rivet_type_matrix` (MySQL DATETIME/TIMESTAMP, DECIMAL, BINARY, JSON).
# Columns are aliased to match the Postgres parquet shape (`created_at_tz`, `attrs`).
#
# Usage:
#   mkdir -p dev/output/type_matrix/mysql
#   rivet run --config dev/mysql_type_matrix_export.yaml --export type_matrix_mysql

source:
  type: mysql
  url: "mysql://rivet:rivet@localhost:3306/rivet"

exports:
  - name: type_matrix_mysql
    query: >-
      SELECT id, label, amount, fee,
             created_at_dt AS created_at,
             created_at_ts AS created_at_tz,
             raw_bytes, uid,
             extras AS attrs
      FROM rivet_type_matrix ORDER BY id
    mode: full
    format: parquet
    compression: zstd
    columns:
      amount: decimal(18,2)
      fee: decimal(18,6)
    destination:
      type: local
      path: ./dev/output/type_matrix/mysql
