# Generated by rivet init — orders (~5K rows)
# Review and adjust before running: rivet check --config <this-file>

source:
  type: mysql
  url_env: DATABASE_URL  # export DATABASE_URL='<your-url>'

exports:
  - name: orders
    query: >
      SELECT id, user_id, product, quantity, price, status, notes, ordered_at, updated_at
      FROM orders
    mode: full
    format: parquet
    destination:
      type: local
      path: ./dev/output
