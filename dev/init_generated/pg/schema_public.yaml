# Generated by rivet init — PostgreSQL schema "public" (7 objects)
# Review and adjust before running: rivet check --config <this-file>

source:
  type: postgres
  url_env: DATABASE_URL  # export DATABASE_URL='<your-url>'

# One export per table/view — review modes and destinations before running.
exports:
  - name: content_items
    query: >
      SELECT id, title, body, raw_html, metadata, tags, author_name, author_email, source_url, category, status, priority, view_count, comment_count, word_count, language, published_at, updated_at, created_at, extra_data
      FROM content_items
    mode: chunked
    chunk_column: id
    chunk_size: 100000
    format: parquet
    destination:
      type: local
      path: ./dev/output
  - name: events
    query: >
      SELECT id, user_id, event_type, payload, ip_address, created_at
      FROM events
    mode: full
    format: parquet
    destination:
      type: local
      path: ./dev/output
  - name: orders
    query: >
      SELECT id, user_id, product, quantity, price, status, notes, ordered_at, updated_at
      FROM orders
    mode: full
    format: parquet
    destination:
      type: local
      path: ./dev/output
  - name: orders_sparse
    query: >
      SELECT id, payload
      FROM orders_sparse
    mode: full
    format: parquet
    destination:
      type: local
      path: ./dev/output
  - name: orders_sparse_for_export
    query: >
      SELECT id, payload, chunk_rownum
      FROM orders_sparse_for_export
    mode: full
    format: parquet
    destination:
      type: local
      path: ./dev/output
  - name: page_views
    query: >
      SELECT id, session_id, user_id, url, referrer, user_agent, ip_address, country_code, region, city, device_type, browser, os, screen_width, screen_height, viewport_width, viewport_height, page_load_ms, dom_ready_ms, time_on_page_ms, scroll_depth_pct, click_count, is_bounce, utm_source, utm_medium, utm_campaign, utm_term, utm_content, custom_props, created_at
      FROM page_views
    mode: chunked
    chunk_column: id
    chunk_size: 100000
    parallel: 2
    format: parquet
    destination:
      type: local
      path: ./dev/output
  - name: users
    query: >
      SELECT id, name, email, age, balance, is_active, bio, created_at, updated_at
      FROM users
    mode: full
    format: parquet
    destination:
      type: local
      path: ./dev/output
